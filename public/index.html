<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="style.css">
    <title>The Turtle Tank</title>
</head>
<body>
    <div class="aquarium">
        <h1>🐢 Turtle Graph Tank</h1>
        <div id="turtle-list">Loading the tank...</div>
        
        <div class="bubble"></div>
        <div class="bubble"></div>
    </div>

    <script>
        async function fetchTurtles() {
            try {
                const res = await fetch('/.netlify/functions/getTurtles');
                const data = await res.json();
                
                // This is the missing line!
                const container = document.getElementById('turtle-list');
                
                container.innerHTML = data.map(t => `
                    <div class="turtle-card">
                        <div style="font-size: 40px;">🐢</div>
                        <h3>${t.name}</h3>
                        <p>Species: ${t.species}</p>
                        <p>Age: ${t.age}</p>
                    </div>
                `).join('');
            } catch (err) {
                console.error("Tank leak!", err);
                document.getElementById('turtle-list').innerText = "Failed to load turtles.";
            }
        }
        fetchTurtles();
    </script>
</body>
</html>
