<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="style.css">
    <title>The Turtle Tank</title>
</head>
<body>
    <div class="aquarium">
        <h1>🐢 Turtle Graph Tank</h1>
        <div id="turtle-list">Loading the tank...</div>
        
        <div class="bubble"></div>
        <div class="bubble"></div>
    </div>

    <script>
        async function fetchTurtles() {
            container.innerHTML = data.map(t => `
                <div class="turtle-card">
                    <div style="font-size: 40px;">🐢</div>
                    <h3>${t.name}</h3>
                    <hr style="border: 0; border-top: 1px solid #4fc3f7; margin: 10px 0;">
                    <p><strong>Species:</strong> ${t.species}</p>
                    <p><strong>Status:</strong> Active in Tank</p>
                </div>
            `).join('');
        }
        fetchTurtles();
    </script>
</body>
</html>
